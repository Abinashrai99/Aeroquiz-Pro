<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroQuiz Pro - Flight Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="menu" class="screen active">
            <div class="header-row">
                <h1>✈️ AeroQuiz</h1>
                <div class="badge" id="license-rank">PPL</div>
            </div>
            
            <div class="level-box">
                <div class="level-info">
                    <span>LVL <b id="display-lvl">1</b></span>
                    <span id="display-rank-name">Student Pilot</span>
                </div>
                <div class="xp-bar-bg"><div id="xp-bar-fill"></div></div>
                <div class="xp-text"><span id="current-xp">0</span> / 500 XP</div>
            </div>

            <div class="settings-grid">
                <div class="toggle-item">
                    <span>Hard Mode (2x XP)</span>
                    <label class="switch"><input type="checkbox" id="hard-mode-toggle"><span class="slider"></span></label>
                </div>
                <div class="toggle-item">
                    <span>Reverse (Code ➔ Name)</span>
                    <label class="switch"><input type="checkbox" id="reverse-mode-toggle"><span class="slider"></span></label>
                </div>
            </div>
            
            <div class="mode-selection">
                <button class="menu-btn" onclick="startGame('domestic')">🇮🇳 Indian Airports</button>
                <button class="menu-btn btn-green" onclick="startGame('intl')">🌍 International</button>
                <button class="menu-btn btn-purple" onclick="startGame('airlines')">✈️ Airline Codes</button>
                <button class="menu-btn btn-gold" onclick="startFlightPath()">🗺️ BOSS: Flight Path</button>
            </div>

            <div class="career-tabs">
                <button onclick="showTab('log')">Flight Log</button>
                <button onclick="showTab('weak')">Weak Spots (<span id="weak-count">0</span>)</button>
            </div>
            <div id="tab-content" class="tab-pane">Select a tab to view stats.</div>
        </div>

        <div id="game" class="screen">
            <div class="stats-bar">
                <div id="q-count">0/20</div>
                <div id="streak-box">🔥 0</div>
                <div id="xp-display">PTS: 0</div>
            </div>
            <div id="timer-container"><div id="timer-bar"></div></div>
            
            <div id="route-tracker">
                <b>ROUTE:</b> <span id="route-display"></span>
            </div>

            <div class="quiz-container">
                <p id="q-type-label"></p>
                <h2 id="question-text">Loading...</h2>
                <div id="choices" class="options-grid"></div>
                <p id="msg"></p>
            </div>
        </div>

        <div id="results" class="screen">
            <div class="results-card">
                <div class="results-header">MISSION DEBRIEF</div>
                <div id="rank-display" class="rank-badge"></div>
                <div id="final-stats" class="final-stats-grid"></div>
                
                <div id="mistake-review-container">
                    <p class="review-title">📂 BLACK BOX REPORT</p>
                    <div id="mistake-list"></div>
                </div>
                <button class="menu-btn restart-btn" onclick="location.reload()">Return to Hangar</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
